services:
  postgres:
    image: postgres:16-alpine
    container_name: alphaagent-postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alphaagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphaagent_dev}
      POSTGRES_DB: ${POSTGRES_DB:-alphaagent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alphaagent}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
